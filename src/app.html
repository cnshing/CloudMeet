<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
			Inline theme script — runs synchronously before any paint so there is
			no flash of the wrong theme.  Reads `localStorage` for a saved
			preference ('light' | 'dark' | 'system') and falls back to 'system',
			which honours the OS prefers-color-scheme media query.
		-->
		<script>
			(function () {
				var pref = localStorage.getItem('theme-preference') || 'system';
				var prefersDark =
					pref === 'dark' ||
					(pref === 'system' &&
						window.matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.classList.toggle('dark', prefersDark);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
